spring:
  liquibase:
    enabled: false

notification:
  templates:
    capacity-alert:
      email:
        subject: "Capacity alert on {corridorName}"
        body: |
          Hi {cityManagerName},

          Our analytics detected a persistent overload on {corridorName} ({routeId})
          during {timeWindow}.

          Key metric:
            • {supportingMetric}

          Recommendation:
            • Add {recommendedExtraBuses} additional buses during this time window.

          Please review this suggestion in the dashboard.

      in-app:
        subject: "Capacity alert: {corridorName}"
        body: "Add {recommendedExtraBuses} buses on {routeId} during {timeWindow}."

    underutilized-route:
      email:
        subject: "Underutilized route: {routeId}"
        body: |
          Hi {cityManagerName},

          Route {routeId} appears underutilized during {timeWindow}.

          Key metric:
            • {supportingMetric}

          Recommendation:
            • Consider reducing frequency or reallocating buses to higher-demand corridors.

          Explore alternative allocation options in the dashboard.

      in-app:
        subject: "Underutilized route {routeId}"
        body: "Route {routeId} underutilized in {timeWindow}. Consider reallocating capacity."
    approval-request:
      email:
        subject: "[{indicator}] Approval requested by {requestedBy}"
        body: |
          Hi {reviewerName},

          A new approval request has been submitted on CityControl.

          Indicator : {indicator}
          Requested by : {requestedBy}
          Submitted at : {createdAt}

          Summary:
          {summary}

          Please log in to CityControl to review and approve or deny this request.

      in-app:
        subject: "[{indicator}] New approval request from {requestedBy}"
        body: "{summary}"

    approval-decision:
      email:
        subject: "[{indicator}] Your request has been {status}"
        body: |
          Hi {requestedBy},

          Your approval request has been {status} by {reviewedBy}.

          Summary:
          {summary}

          {reviewNoteSection}

          Log in to CityControl to view the full details.

      in-app:
        subject: "[{indicator}] Request {status}"
        body: "Your request was {status} by {reviewedBy}.{reviewNoteInline}"

    default:
      email:
        subject: "Notification from Hermes"
        body: |
          {recommendation}

      in-app:
        subject: "New notification"
        body: |
          {recommendation}

mail:
  from: no-reply@citycontrol.me

aws:
  region: eu-west-1
