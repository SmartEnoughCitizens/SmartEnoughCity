services:
  postgres:
    image: postgis/postgis:18-3.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_owner
      POSTGRES_PASSWORD: dev_app_owner_password
      POSTGRES_DB: smart_enough_city
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - postgres-internal
      - keycloak-postgres

  postgres-init:
    image: postgis/postgis:18-3.6-alpine
    depends_on:
      - postgres
    restart: "no"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smart_enough_city
      POSTGRES_PASSWORD: dev_postgres_password
      APP_OWNER_USER: app_owner
      APP_OWNER_PASSWORD: dev_app_owner_password
      DATA_HANDLER_USER: data_handler
      DATA_HANDLER_PASSWORD: dev_data_handler_password
      DATA_HANDLER_SCHEMA: external_data
      BACKEND_USER: backend_user
      BACKEND_USER_PASSWORD: dev_backend_user_password
      BACKEND_SCHEMA: backend
      KEYCLOAK_USER: keycloak
      KEYCLOAK_PASSWORD: dev_keycloak_password
      KEYCLOAK_SCHEMA: keycloak
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo "Waiting for PostgreSQL to be ready..."
        until PGPASSWORD="$$APP_OWNER_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$APP_OWNER_USER" -d postgres -c '\q' 2>/dev/null; do
          echo "PostgreSQL is unavailable - sleeping"
          sleep 2
        done
        echo "PostgreSQL is ready!"

        echo "Enabling PostGIS extension..."
        PGPASSWORD="$$APP_OWNER_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$APP_OWNER_USER" -d "$$DB_NAME" <<EOF
        CREATE EXTENSION IF NOT EXISTS postgis;
        SELECT 'PostGIS extension enabled successfully!' AS status;
        EOF

        echo "Creating postgres user with password..."
        PGPASSWORD="$$APP_OWNER_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$APP_OWNER_USER" -d postgres <<EOF
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = 'postgres') THEN
            CREATE USER postgres WITH PASSWORD '$$POSTGRES_PASSWORD' SUPERUSER;
          ELSE
            ALTER USER postgres WITH PASSWORD '$$POSTGRES_PASSWORD';
          END IF;
        END
        \$\$;
        EOF
        
        echo "Creating $${DATA_HANDLER_USER} user and $${DATA_HANDLER_SCHEMA} schema..."
        PGPASSWORD="$$APP_OWNER_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$APP_OWNER_USER" -d "$$DB_NAME" <<EOF
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = '$$DATA_HANDLER_USER') THEN
            CREATE USER "$$DATA_HANDLER_USER" WITH PASSWORD '$$DATA_HANDLER_PASSWORD';
          ELSE
            ALTER USER "$$DATA_HANDLER_USER" WITH PASSWORD '$$DATA_HANDLER_PASSWORD';
          END IF;
        END
        \$\$;
        
        CREATE SCHEMA IF NOT EXISTS "$$DATA_HANDLER_SCHEMA" AUTHORIZATION "$$DATA_HANDLER_USER";
        
        GRANT ALL PRIVILEGES ON SCHEMA "$$DATA_HANDLER_SCHEMA" TO "$$DATA_HANDLER_USER";
        
        ALTER DEFAULT PRIVILEGES IN SCHEMA "$$DATA_HANDLER_SCHEMA" GRANT ALL ON TABLES TO "$$DATA_HANDLER_USER";
        
        ALTER DEFAULT PRIVILEGES IN SCHEMA "$$DATA_HANDLER_SCHEMA" GRANT ALL ON SEQUENCES TO "$$DATA_HANDLER_USER";
        
        ALTER SCHEMA "$$DATA_HANDLER_SCHEMA" OWNER TO "$$DATA_HANDLER_USER";
        
        GRANT USAGE ON SCHEMA "$$DATA_HANDLER_SCHEMA" TO "$$DATA_HANDLER_USER";
        
        SELECT 'Data handler user initialization completed successfully!' as status;
        EOF
        
        echo "Creating $${KEYCLOAK_USER} user and $${KEYCLOAK_SCHEMA} schema..."
        PGPASSWORD="$$APP_OWNER_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$APP_OWNER_USER" -d "$$DB_NAME" <<EOF
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = '$$KEYCLOAK_USER') THEN
            CREATE USER "$$KEYCLOAK_USER" WITH PASSWORD '$$KEYCLOAK_PASSWORD';
          ELSE
            ALTER USER "$$KEYCLOAK_USER" WITH PASSWORD '$$KEYCLOAK_PASSWORD';
          END IF;
        END
        \$\$;
        
        CREATE SCHEMA IF NOT EXISTS "$$KEYCLOAK_SCHEMA" AUTHORIZATION "$$KEYCLOAK_USER";
        
        GRANT ALL PRIVILEGES ON SCHEMA "$$KEYCLOAK_SCHEMA" TO "$$KEYCLOAK_USER";
        
        ALTER DEFAULT PRIVILEGES IN SCHEMA "$$KEYCLOAK_SCHEMA" GRANT ALL ON TABLES TO "$$KEYCLOAK_USER";
        
        ALTER DEFAULT PRIVILEGES IN SCHEMA "$$KEYCLOAK_SCHEMA" GRANT ALL ON SEQUENCES TO "$$KEYCLOAK_USER";
        
        ALTER SCHEMA "$$KEYCLOAK_SCHEMA" OWNER TO "$$KEYCLOAK_USER";
        
        GRANT USAGE ON SCHEMA "$$KEYCLOAK_SCHEMA" TO "$$KEYCLOAK_USER";
        
        SELECT 'Keycloak user initialization completed successfully!' as status;
        EOF
        
        echo "Creating $${BACKEND_USER} user and $${BACKEND_SCHEMA} schema..."
        PGPASSWORD="$$APP_OWNER_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$APP_OWNER_USER" -d "$$DB_NAME" <<EOF
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = '$$BACKEND_USER') THEN
            CREATE USER "$$BACKEND_USER" WITH PASSWORD '$$BACKEND_USER_PASSWORD';
          ELSE
            ALTER USER "$$BACKEND_USER" WITH PASSWORD '$$BACKEND_USER_PASSWORD';
          END IF;
        END
        \$\$;
        
        CREATE SCHEMA IF NOT EXISTS "$$BACKEND_SCHEMA" AUTHORIZATION "$$BACKEND_USER";
        
        GRANT ALL PRIVILEGES ON SCHEMA "$$BACKEND_SCHEMA" TO "$$BACKEND_USER";
        
        ALTER DEFAULT PRIVILEGES IN SCHEMA "$$BACKEND_SCHEMA" GRANT ALL ON TABLES TO "$$BACKEND_USER";
        
        ALTER DEFAULT PRIVILEGES IN SCHEMA "$$BACKEND_SCHEMA" GRANT ALL ON SEQUENCES TO "$$BACKEND_USER";
        
        ALTER SCHEMA "$$BACKEND_SCHEMA" OWNER TO "$$BACKEND_USER";
        
        GRANT USAGE ON SCHEMA "$$BACKEND_SCHEMA" TO "$$BACKEND_USER";
        
        GRANT USAGE ON SCHEMA "$$DATA_HANDLER_SCHEMA" TO "$$BACKEND_USER";
        
        ALTER DEFAULT PRIVILEGES FOR ROLE "$$DATA_HANDLER_USER" IN SCHEMA "$$DATA_HANDLER_SCHEMA" GRANT SELECT ON TABLES TO "$$BACKEND_USER";
        ALTER DEFAULT PRIVILEGES FOR ROLE "$$DATA_HANDLER_USER" IN SCHEMA "$$DATA_HANDLER_SCHEMA" GRANT SELECT ON SEQUENCES TO "$$BACKEND_USER";
        
        GRANT SELECT ON ALL TABLES IN SCHEMA "$$DATA_HANDLER_SCHEMA" TO "$$BACKEND_USER";
        
        GRANT SELECT ON ALL SEQUENCES IN SCHEMA "$$DATA_HANDLER_SCHEMA" TO "$$BACKEND_USER";
        
        CREATE EXTENSION IF NOT EXISTS cube;
        CREATE EXTENSION IF NOT EXISTS earthdistance;

        CREATE OR REPLACE VIEW external_data.v_tram_disruptions AS
          SELECT
              f.id,
              f.stop_id,
              f.line,
              f.message
          FROM external_data.tram_luas_forecasts f
          WHERE
              f.message != ''
              AND (
                  f.message ILIKE '%not in service%'
                  OR f.message ILIKE '%disruption%'
                  OR f.message ILIKE '%suspended%'
                  OR f.message ILIKE '%delay%'
                  OR f.message ILIKE '%fault%'
                  OR f.message ILIKE '%no service%'
                  OR f.message ILIKE '%terminated%'
              );
        
        SELECT 'Backend user initialization completed successfully!' as status;
        
        
        EOF

        echo "Database initialization completed!"
    networks:
      - postgres-internal

  views-init:
    image: postgis/postgis:18-3.6-alpine
    depends_on:
      - postgres-init
    restart: "no"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smart_enough_city
      DATA_HANDLER_USER: data_handler
      DATA_HANDLER_PASSWORD: dev_data_handler_password
      BACKEND_USER: backend_user
      APP_OWNER_USER: app_owner
      APP_OWNER_PASSWORD: dev_app_owner_password
    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo "Waiting for tram tables to exist..."
        until PGPASSWORD="$$DATA_HANDLER_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$DATA_HANDLER_USER" -d "$$DB_NAME" -c "SELECT 1 FROM external_data.tram_luas_stops LIMIT 1" 2>/dev/null; do
          echo "Tables not ready yet - sleeping 10s"
          sleep 10
        done
        echo "Tables ready! Creating views..."

        PGPASSWORD="$$DATA_HANDLER_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$DATA_HANDLER_USER" -d "$$DB_NAME" <<EOF
        CREATE OR REPLACE VIEW external_data.v_tram_disruptions AS
        SELECT
            f.id,
            f.stop_id,
            f.line,
            f.message
        FROM external_data.tram_luas_forecasts f
        WHERE
            f.message != ''
            AND (
                f.message ILIKE '%not in service%'
                OR f.message ILIKE '%disruption%'
                OR f.message ILIKE '%suspended%'
                OR f.message ILIKE '%delay%'
                OR f.message ILIKE '%fault%'
                OR f.message ILIKE '%no service%'
                OR f.message ILIKE '%terminated%'
            );

        CREATE OR REPLACE VIEW external_data.v_tram_alternate_stops AS
        WITH affected AS (
            SELECT stop_id, lat, lon
            FROM external_data.tram_luas_stops
        ),
        bus AS (
            SELECT
                a.stop_id        AS tram_stop_id,
                'bus'            AS transport_type,
                bs.id::text      AS stop_id,
                bs.name          AS stop_name,
                bs.lat, bs.lon,
                NULL::integer    AS available_bikes,
                NULL::integer    AS capacity,
                EARTH_DISTANCE(LL_TO_EARTH(a.lat, a.lon), LL_TO_EARTH(bs.lat, bs.lon))::integer AS distance_m
            FROM external_data.bus_stops bs
            CROSS JOIN affected a
            WHERE EARTH_DISTANCE(LL_TO_EARTH(a.lat, a.lon), LL_TO_EARTH(bs.lat, bs.lon)) <= 500
        ),
        rail AS (
            SELECT
                a.stop_id        AS tram_stop_id,
                'rail'           AS transport_type,
                rs.station_code  AS stop_id,
                rs.station_desc  AS stop_name,
                rs.lat, rs.lon,
                NULL::integer    AS available_bikes,
                NULL::integer    AS capacity,
                EARTH_DISTANCE(LL_TO_EARTH(a.lat, a.lon), LL_TO_EARTH(rs.lat, rs.lon))::integer AS distance_m
            FROM external_data.irish_rail_stations rs
            CROSS JOIN affected a
            WHERE EARTH_DISTANCE(LL_TO_EARTH(a.lat, a.lon), LL_TO_EARTH(rs.lat, rs.lon)) <= 500
        ),
        bikes AS (
            SELECT
                a.stop_id                       AS tram_stop_id,
                'bike'                          AS transport_type,
                dbs.system_id                   AS stop_id,
                dbs.name                        AS stop_name,
                dbs.latitude::double precision  AS lat,
                dbs.longitude::double precision AS lon,
                snap.available_bikes,
                dbs.capacity,
                EARTH_DISTANCE(LL_TO_EARTH(a.lat, a.lon), LL_TO_EARTH(dbs.latitude::double precision, dbs.longitude::double precision))::integer AS distance_m
            FROM external_data.dublin_bikes_stations dbs
            JOIN (
                SELECT DISTINCT ON (station_id) station_id, available_bikes
                FROM external_data.dublin_bikes_station_snapshots
                WHERE is_renting = true
                ORDER BY station_id, timestamp DESC
            ) snap ON snap.station_id = dbs.station_id
            CROSS JOIN affected a
            WHERE EARTH_DISTANCE(LL_TO_EARTH(a.lat, a.lon), LL_TO_EARTH(dbs.latitude::double precision, dbs.longitude::double precision)) <= 500
            AND snap.available_bikes > 0
        )
        SELECT * FROM bus
        UNION ALL SELECT * FROM rail
        UNION ALL SELECT * FROM bikes;
        EOF

        PGPASSWORD="$$APP_OWNER_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$APP_OWNER_USER" -d "$$DB_NAME" <<EOF
        GRANT SELECT ON external_data.v_tram_disruptions TO backend_user;
        GRANT SELECT ON external_data.v_tram_alternate_stops TO backend_user;
        SELECT 'Views created successfully!' AS status;
        EOF

        echo "Views initialization completed!"
    networks:
      - postgres-internal    

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    container_name: keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/smart_enough_city
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: dev_keycloak_password
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    volumes:
      - ./infra/helm-charts/files/dev-realm-export.json:/opt/keycloak/data/import/realm-export.json
    networks:
      - keycloak-postgres

volumes:
  postgres_data:

networks:
  postgres-internal:
    driver: bridge
  keycloak-postgres:
    driver: bridge
