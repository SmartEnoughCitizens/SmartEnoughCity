global:
  imagePullSecrets:
    - ghcr-secret

data-handler:
  imagePullSecrets:
    - ghcr-secret
  image:
    repository: ghcr.io/smartenoughcitizens/smartenoughcity/data-handler
    tag: latest
    pullPolicy: IfNotPresent
  #  cronjob:
  #    suspend: true
  appEnv: "prod"
  gtfsApiBaseUrl: "https://api.nationaltransport.ie/gtfsr/v2"
  ecoCounterApiBaseUrl: "https://api.eco-counter.com/api/v2"
  dublinBikesApiUrl: "https://data.smartdublin.ie/dublinbikes-api/bikes/dublin_bikes/current/stations.geojson"
  irishRailBaseUrl: "http://api.irishrail.ie/realtime/realtime.asmx"
  luasForecastBaseUrl: "https://luasforecasts.rpa.ie/xml/get.ashx"
  ticketmasterApiBaseUrl: "https://app.ticketmaster.com/discovery/v2"
  secrets:
    ecoCounterApiKey:
      name: sec-eco-counter-api-key
    ticketmasterApiKey:
      name: sec-ticketmaster-api-key
  podAnnotations:
    sidecar.istio.io/inject: "false"
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true

frontend:
  imagePullSecrets:
    - ghcr-secret
  image:
    repository: ghcr.io/smartenoughcitizens/smartenoughcity/frontend
    tag: latest
    pullPolicy: IfNotPresent
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true

hermes:
  imagePullSecrets:
    - ghcr-secret
  image:
    repository: ghcr.io/smartenoughcitizens/smartenoughcity/hermes
    tag: latest
    pullPolicy: IfNotPresent
  frontendUrl: "https://dev.citycontrol.me"
  inferenceEngineUrl: "http://sec-inference-engine:8000"
  # TODO: Re-enable health probes after fixing SecurityConfig in Docker image
  livenessProbe: null
  readinessProbe: null
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true

inference-engine:
  imagePullSecrets:
    - ghcr-secret
  image:
    repository: ghcr.io/smartenoughcitizens/smartenoughcity/inference-engine
    tag: latest
    pullPolicy: IfNotPresent
  livenessProbe:
    httpGet:
      path: /docs
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /docs
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true

# Exclude PostgreSQL from Istio injection - databases need direct network access
postgres:
  primary:
    podAnnotations:
      sidecar.istio.io/inject: "false"

# Exclude PostgreSQL init job from Istio - Jobs can't complete with sidecars
postgresqlInit:
  podAnnotations:
    sidecar.istio.io/inject: "false"

# Enable config-cli to push realm changes, exclude from Istio - Jobs can't complete with sidecars
keycloak:
  keycloakConfigCli:
    enabled: true
    existingConfigmap: keycloak-realm-import
    podAnnotations:
      sidecar.istio.io/inject: "false"

ingress:
  enabled: true
  className: nginx

  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

  hosts:
    - host: dev.citycontrol.me
      frontendPaths:
        - path: /
          pathType: Prefix
      hermesPaths:
        - path: /api
          pathType: Prefix

  tls:
    - secretName: sec-dev-citycontrol-tls
      hosts:
        - dev.citycontrol.me
