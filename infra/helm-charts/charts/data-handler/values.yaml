image:
  repository: data-handler
  tag: dev
  pullPolicy: Never

timeZone: "Europe/Dublin"

labels:
  app.kubernetes.io/name: data-handler
  app.kubernetes.io/component: batch-run
  app.kubernetes.io/part-of: smart-enough-city

imagePullSecrets: []

podAnnotations:
  sidecar.istio.io/inject: "false"

securityContext: {}

containerSecurityContext: {}

# Data source toggles — set to "false" to disable a specific source across all CronJobs.
dataToggles:
  enableCycleData: true
  enableCarData: true
  enableBusData: true
  enableTrainData: true
  enableTramData: true
  enableConstructionData: true
  enablePedestrianData: true
  enableEventsData: true
  enablePopulationData: true
  enablePublicSpacesData: true

# One entry per cron cadence. Each becomes a separate CronJob with its ENABLE_* env var set.
cronjobs:
  - name: 1min
    schedule: "* * * * *"
    runVar: ENABLE_ONE_MIN
    activeDeadlineSeconds: 55
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

  - name: 1hour
    schedule: "0 * * * *"
    runVar: ENABLE_ONE_HOUR
    activeDeadlineSeconds: 3300
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

  - name: daily
    schedule: "0 3 * * *"
    runVar: ENABLE_ONE_DAY
    activeDeadlineSeconds: 10800
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

  - name: monthly
    schedule: "0 2 1 * *"
    runVar: ENABLE_ONE_MONTH
    activeDeadlineSeconds: 1800
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

  - name: static
    schedule: "0 1 1 * *"
    runVar: ENABLE_STATIC
    activeDeadlineSeconds: 14400
    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
