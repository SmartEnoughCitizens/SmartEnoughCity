apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-inference-engine
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- toYaml .Values.labels | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: inference-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: inference-engine
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- if .Values.securityContext }}
      securityContext:
{{- toYaml .Values.securityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: inference-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.containerSecurityContext }}
          securityContext:
{{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: HERMES_URL
              value: "http://{{ .Release.Name }}-hermes:8080"
            {{- $dbHost := .Values.global.db.host | default (printf "%s-postgresql" .Release.Name) }}
            - name: DB_HOST
              value: {{ $dbHost | quote }}
            - name: DB_PORT
              value: {{ .Values.global.db.port | default 5432 | quote }}
            - name: DB_NAME
              value: {{ .Values.global.db.name | default "smart_enough_city" | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.secret.name }}
                  key: {{ .Values.db.secret.usernameKey }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.secret.name }}
                  key: {{ .Values.db.secret.passwordKey }}
            # ── Observability ────────────────────────────────────────────
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.jaeger.otlpHttpEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: "inference-engine"
            - name: DEPLOYMENT_ENV
              value: {{ .Values.observability.environment | default "prod" | quote }}
            - name: LOKI_URL
              value: {{ .Values.observability.loki.url | quote }}
            - name: LOKI_TIMEOUTMS
              value: {{ .Values.observability.loki.timeoutMs | default "5000" | quote }}
          resources:
{{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
{{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
{{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
