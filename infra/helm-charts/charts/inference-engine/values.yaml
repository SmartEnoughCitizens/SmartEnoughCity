image:
  repository: inference-engine
  tag: dev
  pullPolicy: Never

replicaCount: 1

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "4Gi"

labels:
  app.kubernetes.io/name: inference-engine
  app.kubernetes.io/component: api-server
  app.kubernetes.io/part-of: smart-enough-city

db:
  secret:
    name: sec-db-backend-user
    usernameKey: DB_BACKEND_USER
    passwordKey: DB_BACKEND_USER_PASSWORD

imagePullSecrets: []

securityContext: {}

containerSecurityContext: {}
