image:
  repository: hermes
  tag: dev
  pullPolicy: Never

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

server:
  port: 8080

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1500m"
    memory: "3Gi"

labels:
  app.kubernetes.io/name: hermes
  app.kubernetes.io/component: api-server
  app.kubernetes.io/part-of: smart-enough-city

# Frontend public URL for password reset emails, etc.
frontendUrl: ""
# Inference engine service URL
inferenceEngineUrl: ""

db:
  secret:
    name: sec-db-backend-user
    usernameKey: DB_BACKEND_USER
    passwordKey: DB_BACKEND_USER_PASSWORD

aws:
  region: eu-west-1
  ses:
    secret:
      name: sec-aws-ses
      accessKeyIdKey: AWS_ACCESS_KEY_ID
      secretAccessKeyKey: AWS_SECRET_ACCESS_KEY

keycloak:
  # Set from parent values
  serverUrl: ""
  realm: ""
  clientId: ""
  secret:
    name: ""
    key: ""

imagePullSecrets: []

securityContext: {}

containerSecurityContext: {}
